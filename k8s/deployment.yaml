apiVersion: v1
kind: Namespace
metadata:
  name: test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-test
  namespace: test
  labels:
    app.kubernetes.io/name: agent-test
    app.kubernetes.io/part-of: demo-chain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-test
        app.kubernetes.io/part-of: demo-chain
    spec:
      containers:
        - name: agent-test
          image: registry.example.com/demo/agent-test:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: agent-test-env
            - secretRef:
                name: agent-test-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-test
  namespace: test
  labels:
    app.kubernetes.io/name: agent-test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-test
  ports:
    - name: http
      port: 8000
      targetPort: http
