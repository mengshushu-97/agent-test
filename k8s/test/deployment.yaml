apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-test
  namespace: test
  labels:
    app.kubernetes.io/name: agent-test
    app.kubernetes.io/part-of: demo-chain
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-test
        app.kubernetes.io/part-of: demo-chain
    spec:
      imagePullSecrets:
        - name: harbor-auth
      containers:
        - name: agent-test
          image: harbor.local/test/agent-test:2e8ba96c23469aaf0bf89e921a0ded44f6b84eb3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: agent-test-env
            - secretRef:
                name: agent-test-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-test
  namespace: test
  labels:
    app.kubernetes.io/name: agent-test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-test
  ports:
    - name: http
      port: 8000
      targetPort: http
