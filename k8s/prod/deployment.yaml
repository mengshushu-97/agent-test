apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-test
  namespace: prod
  labels:
    app.kubernetes.io/name: agent-test
    app.kubernetes.io/part-of: demo-chain
spec:
  replicas: 0
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-test
        app.kubernetes.io/part-of: demo-chain
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - agent-test
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: harbor-auth
      containers:
        - name: agent-test
          image: harbor.local/prod/agent-test:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: agent-test
            - name: APP_ENV
              value: prod
            - name: PORT
              value: "8000"
            - name: JAVA_SERVICE_URL
              value: http://java-test:8080
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=prod,service.namespace=demo
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: agent-test
  namespace: prod
  labels:
    app.kubernetes.io/name: agent-test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-test
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-test
  namespace: prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-test
