name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-prod to confirm production deployment
        required: true

concurrency:
  group: agent-test-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy agent-test to prod
    if: ${{ github.event.inputs.confirm == 'deploy-prod' }}
    runs-on:
      - self-hosted
      - k3s
      - prod
    environment: production
    env:
      APP_NAME: agent-test
      CONTAINER_NAME: agent-test
      NAMESPACE: prod
      MANIFEST_FILE: k8s/prod/deployment.yaml
      HARBOR_REGISTRY: harbor.local
      HARBOR_PROJECT: prod
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner preflight
        env:
          CHECK_NAMESPACE: prod
        run: ./scripts/check-runner-prereqs.sh

      - name: Test
        run: |
          mkdir -p "$HOME/.cache/pip/agent-test"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cache/pip/agent-test:/tmp/pip-cache" \
            -w /workspace \
            -e HOME=/tmp \
            -e PIP_CACHE_DIR=/tmp/pip-cache \
            -e PIP_INDEX_URL=https://mirrors.aliyun.com/pypi/simple/ \
            -e PIP_TRUSTED_HOST=mirrors.aliyun.com \
            python:3.13-slim \
            sh -lc "pip install --timeout 120 --retries 5 -e '.[test]' && python -m unittest tests/test_api_contract.py"

      - name: Build and push Harbor image
        run: ./scripts/build-push-harbor.sh

      - name: Update GitOps manifest
        env:
          IMAGE: harbor.local/prod/agent-test:${{ github.sha }}
        run: ./scripts/update-k8s-image.sh

      - name: Commit GitOps manifest
        run: |
          if git diff --quiet -- "$MANIFEST_FILE"; then
            echo "No manifest changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_FILE"
          git commit -m "chore(cicd): deploy $APP_NAME $IMAGE_TAG [skip ci]"
          git pull --rebase
          git push
